<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; background: transparent; overflow-x: hidden; }
      button, input { font: inherit; }
      .mk-shell { --mk-bg:#111421; --mk-panel:#171b2a; --mk-muted:#9ba6bb; --mk-text:#eef2ff; --mk-green:#35d38b; --mk-red:#fb7185; min-height: calc(100vh - 92px); width:100%; box-sizing:border-box; padding: 6px 4px 10px; }
      .mk-shell.is-fullscreen, .mk-shell:fullscreen { width:100vw; height:100vh; min-height:100vh; padding:16px; background:#0b0f1b; overflow:hidden; }
      .mk-shell.is-extended { min-height:118vh; }
      .mk-topbar { display:flex; align-items:flex-end; justify-content:space-between; gap:18px; margin-bottom:10px; }
      .mk-kicker { color:#eef2ff; font-size:24px; line-height:1; font-weight:900; margin-bottom:7px; }
      .mk-view-tabs,.mk-periods,.mk-lang-toggle,.mk-sort,.mk-legend-actions { display:inline-flex; gap:5px; align-items:center; }
      .mk-view-tabs button,.mk-periods button,.mk-lang-toggle button,.mk-sort button,.mk-legend-actions button,.mk-fullscreen-button { border:1px solid rgba(148,163,184,.2); background:rgba(21,24,38,.86); color:#b8c1d4; border-radius:8px; padding:6px 10px; cursor:pointer; font-size:13px; font-weight:800; }
      .mk-view-tabs button.active,.mk-periods button.active,.mk-lang-toggle button.active,.mk-sort button.active { background:rgba(124,58,237,.28); color:#fff; border-color:rgba(167,139,250,.66); }
      .mk-right-actions { display:flex; gap:8px; align-items:center; justify-content:flex-end; flex-wrap:wrap; }
      .mk-fullscreen-button { display:inline-flex; align-items:center; justify-content:center; width:35px; height:34px; padding:0; }
      .mk-fullscreen-button svg { width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:2.2; }
      .mk-dashboard { display:grid; grid-template-columns:minmax(0,74%) minmax(300px,26%); gap:14px; min-height: calc(100vh - 150px); }
      .mk-shell.is-fullscreen .mk-dashboard, .mk-shell:fullscreen .mk-dashboard { min-height:calc(100vh - 82px); height:calc(100vh - 82px); grid-template-columns:minmax(0,74%) minmax(320px,26%); }
      .mk-shell.is-extended .mk-dashboard { min-height:calc(118vh - 130px); }
      .mk-main-card,.mk-side-panel,.mk-card-tracking { background:linear-gradient(180deg,#171b2a 0%,#111421 100%); border:1px solid rgba(148,163,184,.18); border-radius:13px; box-shadow:0 22px 60px rgba(15,23,42,.3); }
      .mk-main-card { padding:13px 14px 12px; min-width:0; }
      .mk-chart-head h2 { margin:0; color:var(--mk-text); font-size:17px; font-weight:900; letter-spacing:0; }
      .mk-chart-head h2 span { color:var(--mk-muted); font-weight:800; }
      .mk-chart-head p { margin:3px 0 0; color:var(--mk-muted); font-size:13px; }
      .mk-chart { height:min(61vh,650px); min-height:440px; width:100%; }
      .mk-shell.is-fullscreen .mk-chart, .mk-shell:fullscreen .mk-chart { height:calc(100vh - 246px); min-height:420px; }
      .mk-shell.is-extended .mk-chart { height:78vh; min-height:560px; }
      .mk-chart svg { width:100%; height:100%; display:block; touch-action:none; }
      .mk-grid-line { stroke:rgba(226,232,240,.56); stroke-width:1.15; }
      .mk-axis-label { fill:#8d98ad; font-size:12px; font-weight:700; }
      .mk-end-label { font-size:12px; font-weight:900; }
      .mk-empty-title { fill:#dbe4f3; font-size:19px; font-weight:900; }
      .mk-empty-subtitle { fill:#94a3b8; font-size:13px; font-weight:600; }
      .mk-legend-wrap { border-top:1px solid rgba(148,163,184,.18); padding-top:10px; margin-top:8px; }
      .mk-legend-actions { margin-bottom:8px; }
      .mk-legend-actions span { color:var(--mk-muted); font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.06em; }
      .mk-legend-actions button { padding:3px 7px; font-size:11px; border-radius:6px; }
      .mk-legend-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px 18px; }
      .mk-shell.is-fullscreen .mk-legend-grid, .mk-shell:fullscreen .mk-legend-grid { grid-template-columns:repeat(4,minmax(0,1fr)); }
      .mk-legend-item { min-width:0; display:grid; grid-template-columns:auto minmax(0,1fr) auto; align-items:center; gap:7px; padding:0; border:0; background:transparent; color:var(--mk-text); cursor:pointer; text-align:left; }
      .mk-legend-item.muted { opacity:.38; }
      .mk-dot { width:10px; height:10px; border-radius:999px; display:inline-block; box-shadow:0 0 16px currentColor; }
      .mk-legend-name { min-width:0; color:#e5e7eb; font-size:13px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .mk-count { border-radius:5px; padding:2px 6px; background:rgba(16,185,129,.18); color:#4ade80; font-size:11px; font-weight:900; white-space:nowrap; }
      .mk-legend-badges { display:inline-flex; align-items:center; gap:5px; min-width:0; }
      .mk-rate-badge { border-radius:5px; padding:2px 6px; color:#cbd5e1; background:rgba(148,163,184,.16); font-size:10px; font-weight:900; white-space:nowrap; }
      .mk-rate-badge.ready { color:#4ade80; background:rgba(16,185,129,.2); }
      .mk-rate-badge.incomplete,.mk-rate-badge.review { color:#fbbf24; background:rgba(245,158,11,.18); }
      .mk-side-panel { min-width:0; padding:15px 14px; min-height:calc(100vh - 150px); overflow:hidden; }
      .mk-shell.is-fullscreen .mk-side-panel, .mk-shell:fullscreen .mk-side-panel { height:calc(100vh - 82px); min-height:0; overflow-y:auto; }
      .mk-panel-header { display:flex; justify-content:space-between; gap:10px; color:var(--mk-muted); font-size:12px; font-weight:800; margin-bottom:18px; }
      .mk-panel-name { min-width:0; display:flex; align-items:center; gap:8px; color:var(--mk-text); font-size:16px; }
      .mk-panel-name strong { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .mk-panel-title { color:var(--mk-text); font-size:17px; font-weight:900; }
      .mk-panel-help { margin-top:20px; color:var(--mk-muted); font-style:italic; }
      .mk-label { color:var(--mk-muted); font-size:13px; font-weight:900; }
      .mk-panel-big { margin-top:6px; color:var(--mk-text); font-size:24px; font-weight:900; }
      .mk-panel-muted,.mk-panel-meta { margin-top:8px; color:var(--mk-muted); font-size:12px; }
      .mk-panel-meta { display:flex; justify-content:space-between; gap:8px; }
      .mk-variations { margin-top:18px; padding-top:14px; border-top:1px solid rgba(148,163,184,.16); }
      .mk-section-head { display:flex; justify-content:space-between; gap:8px; align-items:center; color:var(--mk-text); font-size:14px; font-weight:900; margin-bottom:10px; }
      .mk-sort button { padding:3px 8px; border-radius:6px; }
      .mk-variation-list { max-height:calc(100vh - 360px); overflow-y:auto; padding-right:4px; }
      .mk-empty-line { display:grid; gap:6px; padding:14px 0; border-top:1px solid rgba(148,163,184,.14); border-bottom:1px solid rgba(148,163,184,.14); color:var(--mk-muted); font-size:13px; }
      .mk-empty-line strong { color:#e5e7eb; }
      .mk-card-tracking { min-height:calc(100vh - 150px); padding:16px; }
      .mk-card-top { display:flex; justify-content:space-between; gap:18px; margin-bottom:16px; }
      .mk-card-top h2 { margin:0; color:var(--mk-text); font-size:18px; }
      .mk-card-top p { margin:5px 0 0; color:var(--mk-muted); }
      .mk-search { display:flex; align-items:center; gap:8px; min-width:min(520px,52vw); }
      .mk-search input { flex:1; min-width:0; border:1px solid rgba(148,163,184,.2); border-radius:9px; padding:9px 11px; background:rgba(15,23,42,.58); color:var(--mk-text); outline:none; }
      .mk-card-layout { display:grid; grid-template-columns:minmax(280px,34%) minmax(0,1fr); gap:14px; }
      .mk-results { display:grid; gap:8px; align-content:start; }
      .mk-card-result { display:grid; grid-template-columns:42px minmax(0,1fr); align-items:center; gap:10px; border:1px solid rgba(148,163,184,.16); border-radius:10px; padding:7px; background:rgba(15,23,42,.36); color:var(--mk-text); text-align:left; cursor:pointer; }
      .mk-card-result.active { border-color:rgba(167,139,250,.66); }
      .mk-card-result img,.mk-card-placeholder { width:42px; height:58px; border-radius:6px; object-fit:contain; background:rgba(148,163,184,.12); }
      .mk-card-placeholder { display:flex; align-items:center; justify-content:center; color:var(--mk-muted); font-size:9px; text-align:center; }
      .mk-card-result strong,.mk-card-result small { display:block; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .mk-card-result small { color:var(--mk-muted); margin-top:3px; }
      .mk-card-detail { min-height:500px; display:grid; grid-template-columns:260px minmax(0,1fr); gap:16px; border:1px solid rgba(148,163,184,.16); border-radius:12px; padding:14px; background:rgba(15,23,42,.28); }
      .mk-detail-visual { display:flex; align-items:flex-start; justify-content:center; }
      .mk-detail-visual img,.mk-detail-visual div { max-width:240px; width:100%; aspect-ratio:.716; object-fit:contain; border-radius:12px; background:rgba(148,163,184,.12); color:var(--mk-muted); display:flex; align-items:center; justify-content:center; }
      .mk-detail-chart h3 { margin:0; color:var(--mk-text); }
      .mk-detail-chart p { color:var(--mk-muted); }
      .mk-empty-chart,.mk-empty-box { min-height:220px; border:1px dashed rgba(148,163,184,.24); border-radius:11px; color:var(--mk-muted); display:flex; align-items:center; justify-content:center; text-align:center; padding:20px; }
      .mk-detail-chart button { margin-top:12px; border:1px solid rgba(167,139,250,.66); border-radius:9px; background:rgba(124,58,237,.3); color:#fff; padding:9px 12px; cursor:pointer; font-weight:900; }
      @media (max-width:900px) { .mk-topbar,.mk-card-top { display:grid; } .mk-right-actions { justify-content:flex-start; } .mk-periods { overflow-x:auto; max-width:100%; padding-bottom:4px; } .mk-dashboard,.mk-card-layout,.mk-card-detail { grid-template-columns:1fr; } .mk-side-panel,.mk-main-card,.mk-card-tracking { min-height:auto; } .mk-chart { min-height:330px; height:48vh; } .mk-legend-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } .mk-search { min-width:0; } .mk-shell.is-fullscreen,.mk-shell:fullscreen { overflow:auto; padding:12px; } .mk-shell.is-fullscreen .mk-dashboard,.mk-shell:fullscreen .mk-dashboard { height:auto; min-height:100vh; grid-template-columns:1fr; } .mk-shell.is-fullscreen .mk-chart,.mk-shell:fullscreen .mk-chart { height:56vh; min-height:360px; } .mk-shell.is-fullscreen .mk-side-panel,.mk-shell:fullscreen .mk-side-panel { height:auto; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const PERIOD_DAYS = { "1m":31, "3m":92, "6m":183, "1y":366, all:null };
      let data = { series: [], snapshots: [], cards: [], watchlist_keys: [], source_audit: {} };
      let state = { view:"vmc", selected_period:"all", visible_series_ids:[], selected_series_id:"", variation_sort:"eur", open_card_id:"", open_series_id:"", search_query:"", search_language:"fr", fullscreen:false, extended:false };
      let zoom = 1, pan = 0;

      function send(type, payload={}) { window.parent.postMessage({ isStreamlitMessage:true, type, ...payload }, "*"); }
      function ready() { send("streamlit:componentReady", { apiVersion: 1 }); }
      function setHeight() { setTimeout(() => send("streamlit:setFrameHeight", { height: document.documentElement.scrollHeight }), 0); }
      function emitAction(value) { send("streamlit:setComponentValue", { value, dataType: "json" }); setHeight(); }
      function patch(p) { state = { ...state, ...p }; render(); }
      function esc(v) { return String(v ?? "").replace(/[&<>\"']/g, s => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[s])); }
      function dt(s) { const d = new Date(s.captured_at || s.date || ""); return Number.isNaN(d.valueOf()) ? null : d; }
      function filteredSnapshots() { const days = PERIOD_DAYS[state.selected_period]; if (!days) return data.snapshots || []; const cut = Date.now() - days*86400000; return (data.snapshots || []).filter(s => { const d = dt(s); return d && d.valueOf() >= cut; }); }
      function ensureState() {
        const init = data.initial_state || {};
        const ids = (data.series || []).filter(s => s.default_visible !== false).map(s => s.set_id);
        state = { ...state, ...init };
        if (!state.visible_series_ids || !state.visible_series_ids.length) state.visible_series_ids = ids;
        if (!state.selected_series_id) state.selected_series_id = ids[0] || "";
      }
      function fullscreenIcon() {
        return state.fullscreen || state.extended
          ? `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3H4v5M4 4l6 6M15 3h5v5M20 4l-6 6M9 21H4v-5M4 20l6-6M15 21h5v-5M20 20l-6-6"/></svg>`
          : `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>`;
      }
      function toggleFullscreen() {
        const shell = document.querySelector(".mk-shell");
        if (!shell) return;
        if (document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
          return;
        }
        if (state.extended) {
          patch({ extended:false, fullscreen:false });
          return;
        }
        if (shell.requestFullscreen) {
          state = { ...state, fullscreen:false, extended:true };
          render();
          shell.requestFullscreen().then(() => {
            state = { ...state, fullscreen:true, extended:false };
            render();
          }).catch(() => {
            patch({ extended:true, fullscreen:false });
          });
        } else {
          patch({ extended:true, fullscreen:false });
        }
      }
      function topbar() {
        const periods = [["1m","1 mois"],["3m","3 mois"],["6m","6 mois"],["1y","1 an"],["all","Depuis le début"]];
        return `<div class="mk-topbar"><div><div class="mk-kicker">March&eacute;</div><div class="mk-view-tabs">
          <button class="${state.view==="vmc"?"active":""}" data-view="vmc">VMC par s&eacute;rie</button>
          <button class="${state.view==="cards"?"active":""}" data-view="cards">Suivi des cartes</button>
        </div></div><div class="mk-right-actions"><div class="mk-periods">${periods.map(([k,l]) => `<button class="${state.selected_period===k?"active":""}" data-period="${k}">${l}</button>`).join("")}</div><button class="mk-fullscreen-button" data-fullscreen="1" title="${state.fullscreen ? "Quitter le plein écran" : state.extended ? "Quitter le mode étendu" : "Plein écran"}">${fullscreenIcon()}</button></div></div>`;
      }
      function chartSvg() {
        const W=1200,H=620,p={l:58,r:62,t:18,b:44}, iw=W-p.l-p.r, ih=H-p.t-p.b;
        const traces = (data.series||[]).filter(s => state.visible_series_ids.includes(s.set_id)).map(s => {
          const pts = filteredSnapshots().filter(x => String(x.set_id||"").toUpperCase()===String(s.set_id||"").toUpperCase() && x.vmc_eur != null).map(x => ({d:dt(x), v:Number(x.vmc_eur)})).filter(x => x.d && Number.isFinite(x.v)).sort((a,b)=>a.d-b.d);
          return {s, pts};
        }).filter(t => t.pts.length);
        if (!traces.length) return `<svg viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#171b2a"/><text x="${W/2}" y="${H/2-10}" class="mk-empty-title" text-anchor="middle">Aucune VMC calculable pour le moment</text><text x="${W/2}" y="${H/2+18}" class="mk-empty-subtitle" text-anchor="middle">Configure les pull rates et une source de prix fiable pour commencer l'historique.</text></svg>`;
        const all = traces.flatMap(t=>t.pts), minT=Math.min(...all.map(x=>x.d.valueOf())), maxT=Math.max(...all.map(x=>x.d.valueOf())), minY=Math.min(...all.map(x=>x.v)), maxY=Math.max(...all.map(x=>x.v));
        const ypad=Math.max(.2,(maxY-minY)*.12), span=Math.max(1,maxT-minT), vis=span/zoom, off=Math.max(0,Math.min(span-vis,pan*span));
        const dom={minT:minT+off,maxT:minT+off+vis,minY:Math.max(0,minY-ypad),maxY:maxY+ypad};
        const xs=t=>p.l+((t-dom.minT)/Math.max(1,dom.maxT-dom.minT))*iw, ys=v=>p.t+ih-((v-dom.minY)/Math.max(.01,dom.maxY-dom.minY))*ih;
        const ticks = Array.from({length:7},(_,i)=>i), yTicks=ticks.map(i=>dom.minY+(dom.maxY-dom.minY)*i/6), xTicks=ticks.map(i=>dom.minT+(dom.maxT-dom.minT)*i/6);
        let out = `<svg viewBox="0 0 ${W} ${H}" id="mk-svg"><rect width="${W}" height="${H}" fill="#171b2a"/>`;
        yTicks.forEach(v=>{ const y=ys(v); out += `<line x1="${p.l}" x2="${W-p.r}" y1="${y}" y2="${y}" class="mk-grid-line"/><text x="${p.l-10}" y="${y+4}" class="mk-axis-label" text-anchor="end">${v.toFixed(2)} €</text><text x="${W-p.r+10}" y="${y+4}" class="mk-axis-label">${v.toFixed(2)} €</text>`; });
        xTicks.forEach(t=>{ const x=xs(t), d=new Date(t), lab=String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getFullYear()).slice(2); out += `<line x1="${x}" x2="${x}" y1="${p.t}" y2="${H-p.b}" class="mk-grid-line"/><text x="${x}" y="${H-14}" class="mk-axis-label" text-anchor="middle">${lab}</text>`; });
        traces.forEach(tr=>{ const pts=tr.pts.filter(a=>a.d>=dom.minT&&a.d<=dom.maxT).map(a=>[xs(a.d.valueOf()),ys(a.v),a.v]); if(pts.length<2) return; const path=pts.map((q,i)=>(i?"L":"M")+" "+q[0].toFixed(2)+" "+q[1].toFixed(2)).join(" "); const last=pts[pts.length-1]; out += `<g class="mk-series-path" data-series="${esc(tr.s.set_id)}"><path d="${path}" fill="none" stroke="${esc(tr.s.color)}" stroke-width="2.5"/>${pts.map(q=>`<circle cx="${q[0]}" cy="${q[1]}" r="3.4" fill="${esc(tr.s.color)}" stroke="#dbeafe" stroke-width=".8"/>`).join("")}<text x="${last[0]+8}" y="${last[1]+4}" fill="${esc(tr.s.color)}" class="mk-end-label">${last[2].toFixed(2)}</text></g>`; });
        return out + `</svg>`;
      }
      function legend() {
        return `<div class="mk-legend-wrap"><div class="mk-legend-actions"><span>L&eacute;gende</span><button data-all="1">Toutes</button><button data-none="1">Aucune</button></div><div class="mk-legend-grid">${(data.series||[]).map(s=>{ const pullStatus=s.pull_rate_status||"missing"; return `<button class="mk-legend-item ${state.visible_series_ids.includes(s.set_id)?"visible":"muted"} ${state.selected_series_id===s.set_id?"selected":""}" data-toggle="${esc(s.set_id)}"><span class="mk-dot" style="background:${esc(s.color)};color:${esc(s.color)}"></span><span class="mk-legend-name">${esc(s.name_fr||s.set_id)}</span><span class="mk-legend-badges"><span class="mk-count">${s.cards_count?esc(s.cards_count+" cartes"):"0 carte"}</span><span class="mk-rate-badge ${esc(pullStatus)}">${esc(s.pull_rate_label||"Non renseigné")}</span></span></button>`}).join("")}</div></div>`;
      }
      function panel() {
        const s = (data.series||[]).find(x=>x.set_id===state.selected_series_id) || (data.series||[])[0];
        if(!s) return `<aside class="mk-side-panel"><div class="mk-panel-title">Survoler une s&eacute;rie</div><p class="mk-panel-help">Passez la souris sur une courbe ou choisissez une s&eacute;rie dans la l&eacute;gende.</p></aside>`;
        const exact = !!(data.source_audit && data.source_audit.exact_cardmarket_fr_nm_available);
        return `<aside class="mk-side-panel"><div class="mk-panel-header"><div class="mk-panel-name"><span class="mk-dot" style="background:${esc(s.color)};color:${esc(s.color)}"></span><strong>${esc(s.name_fr||s.set_id)}</strong></div><span>Aucune période disponible</span></div><div class="mk-panel-vmc"><div class="mk-label">VMC indisponible</div><div class="mk-panel-big">--</div><div class="mk-panel-muted">${exact?"Pull rates ou couverture de prix manquants.":"Source de prix exacte indisponible."}</div><div class="mk-panel-meta"><span>Set ${esc(s.set_id||"-")}</span><span>${esc(s.cards_count||0)} cartes connues</span></div></div><div class="mk-variations"><div class="mk-section-head"><span>Plus fortes variations 7 jours</span><div class="mk-sort"><button class="${state.variation_sort==="eur"?"active":""}" data-sort="eur">€</button><button class="${state.variation_sort==="pct"?"active":""}" data-sort="pct">%</button></div></div><div class="mk-variation-list"><div class="mk-empty-line"><strong>Aucun historique de prix exact disponible.</strong><span>Les variations apparaîtront ici quand les snapshots fiables existeront.</span></div></div></div></aside>`;
      }
      function vmcView() { return `<section class="mk-dashboard" id="market_layout_target"><div class="mk-main-card"><div class="mk-chart-head"><div><h2>Évolution VMC <span>€ / booster - molette pour zoomer</span></h2><p>Valeur moyenne contenue estimée par booster standard.</p></div></div><div class="mk-chart">${chartSvg()}</div>${legend()}</div>${panel()}</section>`; }
      function cardsView() {
        const q = state.search_query.toLowerCase(), lang = state.search_language;
        const cards = (data.cards||[]).filter(c=>(c.language||"fr").toLowerCase()===lang).filter(c=>!q || [c.name,c.number,c.set_id,c.set_name,c.rarity,c.variant].filter(Boolean).join(" ").toLowerCase().includes(q)).slice(0,12);
        const first = cards.find(c=>c.card_key===state.open_card_id) || cards[0];
        return `<section class="mk-card-tracking"><div class="mk-card-top"><div><h2>Top 10 des plus grosses variations</h2><p>Aucun classement reel tant qu'aucun historique fiable n'existe.</p></div><div class="mk-search"><div class="mk-lang-toggle"><button class="${lang==="fr"?"active":""}" data-lang="fr">FR</button><button class="${lang==="ja"?"active":""}" data-lang="ja">JP</button></div><input id="mk-search-input" value="${esc(state.search_query)}" placeholder="Nom, numero, serie, rarete ou promo..."></div></div><div class="mk-card-layout"><div class="mk-results">${cards.length?cards.map(c=>`<button class="mk-card-result ${state.open_card_id===c.card_key?"active":""}" data-card="${esc(c.card_key)}">${c.image_url?`<img src="${esc(c.image_url)}" alt="">`:`<span class="mk-card-placeholder">Image indisponible</span>`}<span><strong>${esc(c.name)}</strong><small>#${esc(c.number||"-")} - ${esc(c.set_name||c.set_id||"-")} - ${esc(c.rarity||"Rarete inconnue")}</small></span></button>`).join(""):`<div class="mk-empty-box">Aucune carte eligible trouvee dans le registre local.</div>`}</div><div class="mk-card-detail">${first?`<div class="mk-detail-visual">${first.image_url?`<img src="${esc(first.image_url)}" alt="">`:`<div>Image indisponible</div>`}</div><div class="mk-detail-chart"><h3>${esc(first.name)}</h3><p>#${esc(first.number||"-")} - ${esc(first.set_name||first.set_id||"-")} - ${esc(first.rarity||"Rarete inconnue")}</p><div class="mk-empty-chart">Aucun historique de prix exact disponible.</div><button data-watch="${esc(first.card_key)}">Surveiller</button></div>`:`<div class="mk-empty-box">Recherche une carte pour ouvrir sa fiche marche.</div>`}</div></div></section>`;
      }
      function render() { document.getElementById("root").innerHTML = `<div class="mk-shell ${state.fullscreen?"is-fullscreen":""} ${state.extended?"is-extended":""}">${topbar()}${state.view==="vmc"?vmcView():cardsView()}</div>`; bind(); setHeight(); }
      function bind() {
        document.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>patch({view:b.dataset.view}));
        document.querySelectorAll("[data-period]").forEach(b=>b.onclick=()=>patch({selected_period:b.dataset.period}));
        document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=()=>{ const id=b.dataset.toggle; const has=state.visible_series_ids.includes(id); patch({selected_series_id:id,open_series_id:id,visible_series_ids:has?state.visible_series_ids.filter(x=>x!==id):[...state.visible_series_ids,id]}); });
        document.querySelectorAll("[data-all]").forEach(b=>b.onclick=()=>patch({visible_series_ids:(data.series||[]).map(s=>s.set_id)}));
        document.querySelectorAll("[data-none]").forEach(b=>b.onclick=()=>patch({visible_series_ids:[]}));
        document.querySelectorAll("[data-fullscreen]").forEach(b=>b.onclick=()=>toggleFullscreen());
        document.querySelectorAll("[data-sort]").forEach(b=>b.onclick=()=>patch({variation_sort:b.dataset.sort}));
        document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>patch({search_language:b.dataset.lang}));
        document.querySelectorAll("[data-card]").forEach(b=>b.onclick=()=>patch({open_card_id:b.dataset.card}));
        document.querySelectorAll("[data-watch]").forEach(b=>b.onclick=()=>{ const action={id:Date.now()+"-"+b.dataset.watch,action:"add",card_key:b.dataset.watch}; state={...state,open_card_id:b.dataset.watch}; render(); emitAction({...state,watchlist_action:action}); });
        const search = document.getElementById("mk-search-input"); if(search) search.oninput = e => patch({search_query:e.target.value});
        const svg = document.getElementById("mk-svg"); if(svg){ svg.onwheel = e => { e.preventDefault(); zoom=Math.max(1,Math.min(8,zoom+(e.deltaY < 0 ? .25 : -.25))); render(); }; let down=false,last=0; svg.onpointerdown=e=>{down=true;last=e.clientX;svg.setPointerCapture(e.pointerId)}; svg.onpointermove=e=>{if(!down)return; pan=Math.max(0,Math.min(1,pan-(e.clientX-last)/900/zoom)); last=e.clientX; render();}; svg.onpointerup=()=>down=false; document.querySelectorAll(".mk-series-path").forEach(g=>g.onclick=()=>patch({selected_series_id:g.dataset.series,open_series_id:g.dataset.series})); }
      }
      document.addEventListener("fullscreenchange", () => { state = { ...state, fullscreen: !!document.fullscreenElement, extended: document.fullscreenElement ? false : state.extended }; render(); });
      document.addEventListener("keydown", event => { if (event.key === "Escape" && state.extended && !document.fullscreenElement) patch({ extended:false, fullscreen:false }); });
      window.addEventListener("message", event => { const msg = event.data || {}; if (msg.type !== "streamlit:render") return; data = msg.args?.data || data; ensureState(); render(); });
      ready();
    </script>
  </body>
</html>
